apiVersion: v1
kind: ServiceAccount
metadata:
  name: upload-api
  namespace: ingestion
  labels:
    azure.workload.identity/use: 'true'
  annotations:
    # Rendered post-apply from terraform output identity.upload_api.client_id
    # into build/ by scripts/render-k8s.sh. Committed copy holds a placeholder.
    azure.workload.identity/client-id: __UPLOAD_API_CLIENT_ID__
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: embedding-worker
  namespace: ingestion
  labels:
    azure.workload.identity/use: 'true'
  annotations:
    azure.workload.identity/client-id: __EMBEDDING_WORKER_CLIENT_ID__
