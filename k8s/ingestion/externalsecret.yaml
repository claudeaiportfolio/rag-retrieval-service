# Syncs the shared Redis password from Key Vault (localdevenv) into a namespace
# Secret via External Secrets Operator. The KV secret `redis-password` is created
# by Terraform (terraform/main.tf); the cluster-wide `azure-kv` ClusterSecretStore
# (workload identity) is provided by the cluster-management repo. The worker,
# upload-api, and KEDA TriggerAuthentication all consume `redis-credentials`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: ingestion
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: redis-password
