apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: upload-api
  namespace: ingestion
spec:
  hostnames:
    - rag-ingest.dev.michaelalinks.com
  parentRefs:
    - name: cluster-issuer-gateway
      namespace: envoy-gateway-system
      sectionName: https
  rules:
    - backendRefs:
        - name: upload-api
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /
