apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: query
  labels:
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
        azure.workload.identity/use: 'true'
    spec:
      serviceAccountName: mcp-server
      containers:
        - name: mcp-server
          image: __ACR_LOGIN_SERVER__/rag-mcp-server:latest # {"$imagepolicy": "flux-system:rag-mcp-server"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: rag-config
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
