name: secret-scan

# Consolidated onto the shared org security action
# (claudeaiportfolio/ai-infra-templates/action): a deterministic, blocking
# gitleaks gate on every push/PR (using this repo's .gitleaks.toml), plus the
# advisory Claude review on PRs. Replaces the previous standalone gitleaks job.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: claudeaiportfolio/ai-infra-templates/action@main
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
