name: experiment

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: 'Which scaling experiment to run.'
        type: choice
        options:
          - keda-burst
        default: keda-burst

permissions:
  id-token: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/setup-kubectl@v4

      - run: az aks get-credentials --name ${{ secrets.AKS_CLUSTER_NAME }} --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} --overwrite-existing

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --frozen

      - if: ${{ inputs.experiment == 'keda-burst' }}
        run: uv run python scripts/experiments/keda_burst.py
        env:
          UPLOAD_API_URL: https://ingest.rag.dev.michaelalinks.com
          INGEST_TENANT_ID: keda-burst

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: experiment-${{ inputs.experiment }}
          path: out/
          retention-days: 30
